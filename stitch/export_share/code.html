<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#bbc3ff]" data-icon="qr_code_2">qr_code_2</span>

<div class="relative glass-card rounded-2xl p-8 md:p-12 qr-gradient-overlay overflow-hidden shadow-2xl">
<div class="bg-surface-bright p-8 rounded-xl shadow-inner aspect-square flex items-center justify-center relative overflow-hidden">

</div>
<div class="mt-8 flex justify-between items-center">
<div>
<h3 class="font-headline font-bold text-lg text-on-surface">Portfolio_v2_Final</h3>

</div>
<button class="flex items-center gap-2 text-primary hover:text-secondary-fixed transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
<span class="text-sm font-semibold">Refine</span>
</button>
</div>
</div>
</div>
</div>
<!-- Right Column: Controls & Destinations -->

<!-- Action Group 1: Downloads -->
<section class="flex flex-col gap-4">
<h4 class="text-sm font-semibold text-on-surface-variant tracking-widest uppercase">High-Res Download</h4>
<div class="grid grid-cols-1 gap-3">
<button class="group flex items-center justify-between p-5 bg-surface-container-high rounded-xl hover:bg-surface-container-highest transition-all duration-300">
<div class="flex items-center gap-4">
<div class="bg-primary/10 p-3 rounded-lg group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="image">image</span>
</div>
<div class="text-left">
<p class="font-bold text-on-surface">PNG Image</p>

</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="download">download</span>

</div>
<div class="text-left">
<p class="font-bold text-on-surface">SVG Vector</p>

</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="download">download</span>
</button>

<div class="bg-tertiary/10 p-3 rounded-lg group-hover:bg-tertiary/20 transition-colors">
<span class="material-symbols-outlined text-tertiary" data-icon="picture_as_pdf">picture_as_pdf</span>
</div>
<div class="text-left">
<p class="font-bold text-on-surface">PDF Document</p>
<p class="text-xs text-on-surface-variant">Print CMYK • Vector</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="download">download</span>
</button>
</div>

<span class="material-symbols-outlined text-on-surface" data-icon="send">send</span>

<span class="material-symbols-outlined text-on-surface" data-icon="more_horiz">more_horiz</span>
</button>
</div>
</section>

<section class="flex flex-col gap-3 mt-4">
<button class="w-full bg-primary py-5 rounded-xl font-headline font-extrabold text-on-primary shadow-lg shadow-primary/10 flex items-center justify-center gap-3 active:scale-95 transition-transform">
